<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>งานเตรียมรถ · 54นิวัฒน์</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@500;600;700&family=Sarabun:wght@400;500;600;700&family=JetBrains+Mono:wght@500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #F3F5F6;
    --surface: #FFFFFF;
    --ink: #16222B;
    --ink-soft: #5B6B76;
    --line: #E3E8EA;
    --teal: #1F6F6B;
    --teal-deep: #154E4B;
    --teal-tint: #E6F1F0;
    --amber: #C97F1E;
    --amber-tint: #FBF0DE;
    --red: #C7433F;
    --red-tint: #FBEAE9;
    --green: #2E8B57;
    --green-tint: #E7F4EC;
    --gray: #8A98A2;
    --gray-tint: #EEF1F2;
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: 'Sarabun', 'Segoe UI', sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  body { padding: 20px 16px 60px; max-width: 960px; margin: 0 auto; }

  .topbar {
    display: flex; align-items: baseline; justify-content: space-between;
    margin-bottom: 20px; flex-wrap: wrap; gap: 8px;
  }
  .topbar h1 {
    font-family: 'Chakra Petch', sans-serif;
    font-weight: 600;
    font-size: 22px;
    letter-spacing: 0.2px;
    margin: 0;
    color: var(--teal-deep);
  }
  .topbar .sub {
    font-size: 12.5px;
    color: var(--ink-soft);
  }

  /* ===== สรุปสถานะ ===== */
  .stats {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 10px;
    margin-bottom: 18px;
  }
  .stat {
    background: var(--surface);
    border-radius: var(--radius-sm);
    padding: 12px 10px;
    border-left: 4px solid var(--gray);
    box-shadow: 0 1px 2px rgba(20,30,35,0.04);
  }
  .stat .num {
    font-family: 'Chakra Petch', sans-serif;
    font-size: 24px;
    font-weight: 700;
    line-height: 1;
  }
  .stat .label {
    font-size: 11.5px;
    color: var(--ink-soft);
    margin-top: 4px;
    white-space: nowrap;
  }
  .stat.all { border-color: var(--ink); }
  .stat.pending { border-color: var(--gray); }
  .stat.progress { border-color: var(--amber); }
  .stat.problem { border-color: var(--red); }
  .stat.done { border-color: var(--green); }

  /* ===== แท็บกรอง + ค้นหา ===== */
  .controls {
    display: flex; gap: 10px; align-items: center;
    margin-bottom: 16px; flex-wrap: wrap;
  }
  .tabs {
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .tab {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px; font-weight: 600;
    padding: 7px 13px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink-soft);
    cursor: pointer;
    transition: all .15s ease;
  }
  .tab:hover { border-color: var(--teal); color: var(--teal-deep); }
  .tab.active {
    background: var(--teal); border-color: var(--teal); color: #fff;
  }
  .search {
    margin-left: auto;
    flex: 1 1 180px; max-width: 240px;
  }
  .search input {
    width: 100%;
    font-family: 'Sarabun', sans-serif;
    font-size: 13.5px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid var(--line);
    background: var(--surface);
    color: var(--ink);
  }
  .search input:focus { outline: 2px solid var(--teal); outline-offset: 1px; }
  .search input::placeholder { color: var(--gray); }

  /* ===== รายการใบงาน ===== */
  #list { display: flex; flex-direction: column; gap: 12px; }

  .empty {
    text-align: center; color: var(--ink-soft);
    padding: 50px 20px; font-size: 14px;
    background: var(--surface); border-radius: var(--radius);
    border: 1px dashed var(--line);
  }
  .empty.err { color: var(--red); border-color: var(--red); }

  .card {
    background: var(--surface);
    border-radius: var(--radius);
    padding: 16px;
    box-shadow: 0 1px 3px rgba(20,30,35,0.06);
    border-left: 4px solid var(--gray);
  }
  .card.status-pending { border-left-color: var(--gray); }
  .card.status-progress { border-left-color: var(--amber); }
  .card.status-problem { border-left-color: var(--red); }
  .card.status-done { border-left-color: var(--green); opacity: 0.82; }

  .card-head {
    display: flex; align-items: flex-start; justify-content: space-between;
    gap: 10px; margin-bottom: 10px; flex-wrap: wrap;
  }
  .id-group { display: flex; align-items: center; gap: 10px; flex-wrap: wrap; }

  .plate {
    font-family: 'JetBrains Mono', monospace;
    font-weight: 700;
    font-size: 13px;
    letter-spacing: 0.5px;
    color: var(--ink);
    background: #fff;
    border: 2px solid var(--ink);
    border-radius: 6px;
    padding: 3px 9px;
    box-shadow: inset 0 0 0 1.5px #fff;
    white-space: nowrap;
  }
  .model { font-weight: 700; font-size: 15.5px; }

  .badge {
    font-size: 11px; font-weight: 700;
    padding: 3px 10px; border-radius: 999px;
    color: #fff; white-space: nowrap;
  }
  .badge.pending { background: var(--gray); }
  .badge.progress { background: var(--amber); }
  .badge.problem { background: var(--red); }
  .badge.done { background: var(--green); }

  .meta {
    font-size: 12.5px; color: var(--ink-soft);
    margin-bottom: 12px;
    display: flex; gap: 14px; flex-wrap: wrap;
  }
  .meta b { color: var(--ink); font-weight: 600; }

  .tasks { margin-bottom: 12px; }
  .task {
    display: flex; align-items: center; gap: 9px;
    padding: 6px 0;
    font-size: 14px;
    border-bottom: 1px solid var(--line);
  }
  .task:last-child { border-bottom: none; }
  .task input[type=checkbox] {
    width: 19px; height: 19px; accent-color: var(--teal); cursor: pointer; flex-shrink: 0;
  }
  .task.done label { text-decoration: line-through; color: var(--gray); }
  .task-empty { font-size: 13px; color: var(--gray); font-style: italic; }

  .progress-bar {
    height: 5px; border-radius: 999px; background: var(--gray-tint);
    overflow: hidden; margin-bottom: 12px;
  }
  .progress-bar > div {
    height: 100%; background: var(--teal); border-radius: 999px;
    transition: width .25s ease;
  }

  .row-actions {
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .responsible-input {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px;
    padding: 7px 10px;
    border-radius: var(--radius-sm);
    border: 1px solid var(--line);
    background: var(--gray-tint);
    color: var(--ink);
    flex: 1 1 140px;
    min-width: 100px;
  }
  .responsible-input:focus { outline: 2px solid var(--teal); outline-offset: 1px; background: #fff; }

  .btn {
    font-family: 'Sarabun', sans-serif;
    font-size: 13px; font-weight: 600;
    border: none; border-radius: var(--radius-sm);
    padding: 8px 14px; cursor: pointer;
    transition: filter .15s ease;
  }
  .btn:hover { filter: brightness(0.94); }
  .btn-problem { background: var(--red-tint); color: var(--red); }
  .btn-resolve { background: var(--green-tint); color: var(--green); }

  .note-box {
    margin-top: 10px; font-size: 13px;
    background: var(--red-tint); color: #8C2E2B;
    border-radius: var(--radius-sm);
    padding: 8px 12px;
  }

  @media (max-width: 640px) {
    .stats { grid-template-columns: repeat(3, 1fr); }
    .stat:nth-child(4), .stat:nth-child(5) { grid-column: span 1; }
    .search { flex-basis: 100%; max-width: none; margin-left: 0; order: 3; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; }
  }
</style>
</head>
<body>

  <div class="topbar">
    <h1>🚗 งานเตรียมรถ</h1>
    <div class="sub">54นิวัฒน์ · อัปเดตอัตโนมัติทุก 15 วินาที</div>
  </div>

  <div class="stats" id="stats">
    <div class="stat all"><div class="num" id="stat-all">–</div><div class="label">ทั้งหมด</div></div>
    <div class="stat pending"><div class="num" id="stat-pending">–</div><div class="label">รอดำเนินการ</div></div>
    <div class="stat progress"><div class="num" id="stat-progress">–</div><div class="label">กำลังทำ</div></div>
    <div class="stat problem"><div class="num" id="stat-problem">–</div><div class="label">ติดปัญหา</div></div>
    <div class="stat done"><div class="num" id="stat-done">–</div><div class="label">เสร็จแล้ว</div></div>
  </div>

  <div class="controls">
    <div class="tabs" id="tabs">
      <div class="tab active" data-filter="all">ทั้งหมด</div>
      <div class="tab" data-filter="รอดำเนินการ">รอดำเนินการ</div>
      <div class="tab" data-filter="กำลังทำ">กำลังทำ</div>
      <div class="tab" data-filter="ติดปัญหา">ติดปัญหา</div>
      <div class="tab" data-filter="เสร็จแล้ว">เสร็จแล้ว</div>
    </div>
    <div class="search">
      <input type="text" id="searchBox" placeholder="ค้นหารุ่น / ทะเบียน / เซลส์">
    </div>
  </div>

  <div id="list" class="empty">กำลังโหลด...</div>

<script>
  // ===== ตั้งค่าตรงนี้: วาง URL ของ Apps Script Web App (ลงท้ายด้วย /exec) =====
  const GAS_URL = 'https://script.google.com/macros/s/AKfycbwRUQa4Xgwzfs90rMskRRal533MW-LIxlUM1x0koMbPbrPXzDQy59PCUdkT0Vhf0ApNvw/exec';

  let allOrders = [];
  let currentFilter = 'all';
  let currentSearch = '';

  const STATUS_CLASS = {
    'รอดำเนินการ': 'pending',
    'กำลังทำ': 'progress',
    'ติดปัญหา': 'problem',
    'เสร็จแล้ว': 'done'
  };

  // ===== อ่านข้อมูล: ใช้ JSONP (ไม่ติด CORS เพราะใช้ <script> tag) =====
  function loadOrders() {
    const oldScript = document.getElementById('jsonp-loader');
    if (oldScript) oldScript.remove();

    const callbackName = 'renderCallback_' + Date.now();
    window[callbackName] = function(data) {
      if (data && data.error) {
        showError(data.error);
      } else {
        allOrders = data || [];
        renderStats();
        renderList();
      }
      delete window[callbackName];
    };

    const script = document.createElement('script');
    script.id = 'jsonp-loader';
    script.src = GAS_URL + '?action=getOrders&callback=' + callbackName;
    script.onerror = function() {
      showError('โหลดข้อมูลไม่สำเร็จ กรุณาตรวจสอบ GAS_URL หรือการเชื่อมต่อ');
    };
    document.body.appendChild(script);
  }

  function showError(msg) {
    document.getElementById('list').innerHTML = '<div class="empty err">โหลดข้อมูลไม่สำเร็จ: ' + msg + '</div>';
  }

  function renderStats() {
    const count = { pending: 0, progress: 0, problem: 0, done: 0 };
    allOrders.forEach(o => {
      const key = STATUS_CLASS[o.status];
      if (key) count[key]++;
    });
    document.getElementById('stat-all').textContent = allOrders.length;
    document.getElementById('stat-pending').textContent = count.pending;
    document.getElementById('stat-progress').textContent = count.progress;
    document.getElementById('stat-problem').textContent = count.problem;
    document.getElementById('stat-done').textContent = count.done;
  }

  function renderList() {
    const list = document.getElementById('list');
    let orders = allOrders;

    if (currentFilter !== 'all') {
      orders = orders.filter(o => o.status === currentFilter);
    }
    if (currentSearch) {
      const q = currentSearch.toLowerCase();
      orders = orders.filter(o =>
        (o.model || '').toLowerCase().includes(q) ||
        (o.plate || '').toLowerCase().includes(q) ||
        (o.salesName || '').toLowerCase().includes(q)
      );
    }

    if (!orders.length) {
      list.innerHTML = '<div class="empty">ไม่พบใบงานที่ตรงกับเงื่อนไข</div>';
      return;
    }

    list.innerHTML = '';
    orders.forEach(o => {
      const statusKey = STATUS_CLASS[o.status] || 'pending';
      const total = o.checklist.length;
      const doneCount = o.checklist.filter(t => t.done).length;
      const pct = total ? Math.round((doneCount / total) * 100) : 0;

      const div = document.createElement('div');
      div.className = 'card status-' + statusKey;

      let tasksHtml = total
        ? o.checklist.map((t, idx) => `
          <div class="task ${t.done ? 'done' : ''}">
            <input type="checkbox" ${t.done ? 'checked' : ''} onchange="toggle(${o.row}, ${idx})">
            <label>${escapeHtml(t.task)}</label>
          </div>`).join('')
        : '<div class="task-empty">ไม่มีรายการงานย่อย</div>';

      div.innerHTML = `
        <div class="card-head">
          <div class="id-group">
            <span class="model">${escapeHtml(o.model)}</span>
            <span class="plate">${escapeHtml(o.plate)}</span>
          </div>
          <span class="badge ${statusKey}">${o.status}</span>
        </div>
        <div class="meta">
          <span>เซลส์: <b>${escapeHtml(o.salesName || '-')}</b></span>
          <span>กำหนดส่ง: <b>${escapeHtml(o.deliveryDate || '-')}</b></span>
          ${total ? `<span>เสร็จแล้ว <b>${doneCount}/${total}</b> รายการ</span>` : ''}
        </div>
        ${total ? `<div class="progress-bar"><div style="width:${pct}%"></div></div>` : ''}
        <div class="tasks">${tasksHtml}</div>
        <div class="row-actions">
          <input class="responsible-input" type="text" placeholder="ผู้รับผิดชอบ"
            value="${escapeHtml(o.responsible || '')}" onblur="setResp(${o.row}, this.value)">
          ${o.status === 'ติดปัญหา'
            ? `<button class="btn btn-resolve" onclick="resolveIt(${o.row})">✅ แก้ไขแล้ว</button>`
            : `<button class="btn btn-problem" onclick="reportProblem(${o.row})">🚨 แจ้งปัญหา</button>`}
        </div>
        ${o.status === 'ติดปัญหา' && o.note ? `<div class="note-box">⚠️ ${escapeHtml(o.note)}</div>` : ''}
      `;
      list.appendChild(div);
    });
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, m => ({
      '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
    }[m]));
  }

  // ===== เขียนข้อมูล: ส่งแบบ form-urlencoded (ไม่ติด CORS เพราะนับเป็น simple request) =====
  function sendAction(params) {
    return fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
      body: new URLSearchParams(params).toString()
    }).catch(err => console.log('ส่งคำสั่งแล้ว (ไม่อ่าน response):', err));
  }

  function toggle(row, idx) {
    sendAction({ action: 'toggleTask', row: row, taskIndex: idx })
      .then(() => setTimeout(loadOrders, 500));
  }

  function setResp(row, name) {
    sendAction({ action: 'setResponsible', row: row, name: name });
  }

  function reportProblem(row) {
    const note = prompt('พบปัญหาอะไรครับ?');
    if (note === null) return;
    sendAction({ action: 'markProblem', row: row, note: note })
      .then(() => setTimeout(loadOrders, 500));
  }

  function resolveIt(row) {
    sendAction({ action: 'resolveProblem', row: row })
      .then(() => setTimeout(loadOrders, 500));
  }

  // ===== ควบคุมแท็บกรองสถานะ =====
  document.getElementById('tabs').addEventListener('click', function(e) {
    if (!e.target.classList.contains('tab')) return;
    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.getAttribute('data-filter');
    renderList();
  });

  // ===== ควบคุมช่องค้นหา =====
  document.getElementById('searchBox').addEventListener('input', function(e) {
    currentSearch = e.target.value.trim();
    renderList();
  });

  loadOrders();
  setInterval(loadOrders, 15000);
</script>
</body>
</html>
